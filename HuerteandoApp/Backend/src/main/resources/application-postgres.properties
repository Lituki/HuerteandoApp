# Perfil PostgreSQL (Supabase)
# Actívalo con: --spring.profiles.active=postgres

# Conexión por defecto a Supabase (pooler). En muchas redes es más compatible que "Direct".
spring.datasource.url=${SUPABASE_JDBC_URL:jdbc:postgresql://aws-1-eu-north-1.pooler.supabase.com:6543/postgres?sslmode=require&currentSchema=huerteando&prepareThreshold=0}
# IMPORTANTE: en el pooler de Supabase el tenant se identifica por el usuario `postgres.<project_ref>`.
spring.datasource.username=${SUPABASE_DB_USER:postgres.moqignnvjhcxnhtzcsgx}

# Contraseña SOLO por variable de entorno (no se guarda en el repo)
# Acepta cualquiera de estas variables (por si ejecutas desde VS Code/terminal):
# - SPRING_DATASOURCE_PASSWORD
# - SUPABASE_DB_PASSWORD
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Esquema por defecto (tus scripts usan el schema "huerteando")
spring.jpa.properties.hibernate.default_schema=${SUPABASE_DB_SCHEMA:huerteando}

# En Supabase el esquema se crea con tu script SQL; validamos que coincida.
spring.jpa.hibernate.ddl-auto=validate

# No ejecutar scripts de inicialización automáticamente en Postgres
spring.sql.init.mode=never

# Evita el error "Unable to determine Dialect" si falla la conexión (muestra el error real de conexión/credenciales).
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
