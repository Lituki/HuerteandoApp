spring.config.import=optional:file:.env[.properties]

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# En Spring Boot 4 (Jackson 3, namespace tools.jackson.*) ciertas flags de
# SerializationFeature han cambiado. La serialización ISO-8601 se configura
# vía código en JacksonConfig (ver com.huerteando.huerteandoapp.config).

# Por defecto arrancamos con Postgres (Supabase).
# En local, si quieres H2: --spring.profiles.active=h2
spring.profiles.default=postgres